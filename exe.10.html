<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Techopoly 9x9</title>

<style>

body{
    margin:0;
    padding:0;
    background:#e9eef5;
    font-family:Arial;
}

h1{
    text-align:center;
    margin-top:15px;
}

.top-control{
    text-align:center;
    margin-bottom:15px;
}

input{
    padding:10px;
    width:150px;
}

button{
    padding:10px 20px;
    border:none;
    background:#3498db;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#2980b9;
}

.turn-box{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.queue-box{
    text-align:center;
    margin-bottom:15px;
    font-size:18px;
}

.game-container{
    display:flex;
    justify-content:center;
    position:relative;
}

.board{
    width:900px;
    height:900px;
    background:white;
    border:5px solid black;
    position:relative;
}

.tile{
    position:absolute;
    border:1px solid black;
    box-sizing:border-box;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:11px;
    font-weight:bold;
    padding:5px;
}

.corner{
    width:140px;
    height:140px;
    background:#34495e;
    color:white;
}

.horizontal{
    width:88px;
    height:140px;
}

.vertical{
    width:140px;
    height:88px;
}

.property{
    background:#3498db;
    color:white;
}

.chance{
    background:#9b59b6;
    color:white;
}

.community{
    background:#f39c12;
    color:white;
}

.safe{
    background:#ecf0f1;
}

.jail{
    background:#e74c3c;
    color:white;
}

.center-area{
    position:absolute;
    width:532px;
    height:532px;
    left:184px;
    top:184px;
    background:#f7f9fc;
    border:5px dashed #95a5a6;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.center-area h1{
    font-size:60px;
    margin:0;
    color:#2c3e50;
}

.center-area p{
    font-size:20px;
    color:#7f8c8d;
}

.player{
    width:22px;
    height:22px;
    border-radius:50%;
    position:absolute;
    z-index:999;
    transition:all .5s;
}

.player-info{
    position:absolute;
    width:170px;
    background:white;
    border-radius:10px;
    padding:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    font-size:14px;
}

#p1box{
    left:10px;
    top:140px;
}

#p2box{
    right:10px;
    top:140px;
}

#p3box{
    left:10px;
    bottom:20px;
}

#p4box{
    right:10px;
    bottom:20px;
}

.log{
    width:600px;
    margin:20px auto;
    background:white;
    border-radius:10px;
    padding:15px;
    height:180px;
    overflow:auto;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</style>
</head>
<body>

<h1>🎲 TECHOPOLY MONOPOLY</h1>

<div class="top-control">

<input type="number" id="playerCount" min="2" max="4" placeholder="2-4 Player">

<button onclick="startGame()">Start Game</button>

<button onclick="rollDice()">🎲 Roll Dice</button>

</div>

<div class="turn-box" id="turnInfo">
Masukkan jumlah player
</div>

<div class="queue-box" id="queueDisplay"></div>

<div class="game-container">

<div id="p1box" class="player-info"></div>
<div id="p2box" class="player-info"></div>
<div id="p3box" class="player-info"></div>
<div id="p4box" class="player-info"></div>

<div class="board" id="board">

<div class="center-area">
<h1>TECHOPOLY</h1>
<p>Monopoly Struktur Data</p>
</div>

</div>

</div>

<div class="log" id="log"></div>

<script>

const board = document.getElementById("board");
const logBox = document.getElementById("log");
const turnInfo = document.getElementById("turnInfo");
const queueDisplay = document.getElementById("queueDisplay");

const colors = ["red","blue","green","orange"];

let players = [];
let turnQueue = [];
let gameStarted = false;
let isMoving = false;

const targetMoney = 1000;

const tiles = [];

function createTiles(){

tiles.length = 0;

const names = [

"START",
"Jakarta Digital City",
"Dana Umum",
"Bandung Startup Hub",
"Safe Zone",
"Kesempatan",
"Tokyo Tech Center",
"Cloud District",

"Cyber Jail",

"AI Innovation Lab",
"Dana Umum",
"Singapore Data Center",
"Safe Zone",
"Kesempatan",
"Queue Financial Bank",
"Sorting Factory",

"Free Parking",

"Stack Warehouse",
"Dana Umum",
"Programming Campus",
"Safe Zone",
"Kesempatan",
"Database Central",
"Bug Hunter Zone",

"Go To Jail",

"Data Mining Lab",
"Dana Umum",
"Security Server",
"Safe Zone",
"Kesempatan",
"Algorithm Center",
"Internet Tower"

];

let path = [];

path.push({x:760,y:760,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:672-(i*88),
y:760,
w:88,
h:140
});

}

path.push({x:0,y:760,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:0,
y:672-(i*88),
w:140,
h:88
});

}

path.push({x:0,y:0,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:140+(i*88),
y:0,
w:88,
h:140
});

}

path.push({x:760,y:0,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:760,
y:140+(i*88),
w:140,
h:88
});

}

for(let i=0;i<32;i++){

let type = "property";

if(names[i].includes("Dana")) type = "community";
if(names[i].includes("Kesempatan")) type = "chance";
if(names[i].includes("Safe")) type = "safe";
if(names[i].includes("Jail")) type = "jail";
if(names[i] === "START") type = "start";
if(names[i] === "Free Parking") type = "safe";
if(names[i] === "Go To Jail") type = "jail";

tiles.push({

name:names[i],
type:type,
price:100 + (i*5),
rent:20 + (i*2),
owner:null,

x:path[i].x,
y:path[i].y,
w:path[i].w,
h:path[i].h

});

}

}

createTiles();

function createBoard(){

tiles.forEach(tile=>{

let div = document.createElement("div");

div.classList.add("tile");

if(tile.w === 140 && tile.h === 140){

div.classList.add("corner");

}
else if(tile.h === 140){

div.classList.add("horizontal");

}
else{

div.classList.add("vertical");

}

if(tile.type === "property") div.classList.add("property");
if(tile.type === "chance") div.classList.add("chance");
if(tile.type === "community") div.classList.add("community");
if(tile.type === "safe") div.classList.add("safe");
if(tile.type === "jail") div.classList.add("jail");

div.style.left = tile.x + "px";
div.style.top = tile.y + "px";

div.innerHTML = tile.name;

board.appendChild(div);

});

}

createBoard();

const storyChallenges = [

{
question:
"Di sebuah bank digital, pelanggan yang datang lebih dulu selalu dilayani terlebih dahulu agar sistem tetap adil. Sistem apakah yang digunakan?",
answer:"fifo",
reward:80,
penalty:30,
explanation:"Bank menggunakan konsep FIFO"
},

{
question:
"Seorang koki menumpuk piring bersih di dapur. Saat digunakan, piring paling atas selalu diambil lebih dulu. Konsep apakah ini?",
answer:"lifo",
reward:80,
penalty:30,
explanation:"Tumpukan piring menerapkan konsep LIFO"
},

{
question:
"Sebuah perusahaan ingin mengurutkan data pelanggan dari nilai terkecil ke terbesar agar mudah dibaca admin. Proses ini disebut?",
answer:"sorting",
reward:70,
penalty:25,
explanation:"Mengurutkan data disebut sorting"
},

{
question:
"Kereta api memiliki gerbong yang saling terhubung satu per satu. Struktur data apa yang mirip konsep tersebut?",
answer:"linked list",
reward:90,
penalty:35,
explanation:"Gerbong saling terhubung seperti linked list"
}

];

function startGame(){

let count =
parseInt(document.getElementById("playerCount").value);

if(isNaN(count) || count < 2 || count > 4){

    alert("Player harus 2-4");

    return;

}

players = [];
turnQueue = [];

document.querySelectorAll(".player").forEach(e=>e.remove());

for(let i=0;i<count;i++){

    let player = document.createElement("div");

    player.classList.add("player");

    player.style.background = colors[i];

    board.appendChild(player);

    players.push({

        name:"P"+(i+1),
        money:500,
        position:0,
        properties:[],
        element:player

    });

    turnQueue.push(i);

}

gameStarted = true;

updateAllPlayerPositions();

updateUI();

addLog("🎮 Game dimulai!");

}
function updateAllPlayerPositions(){

    tiles.forEach((tile,tileIndex)=>{

        let playersInTile = [];

        players.forEach((player,index)=>{

            if(player.position === tileIndex){

                playersInTile.push({
                    player:player,
                    index:index
                });

            }

        });

        playersInTile.forEach((data,order)=>{

            let tile = tiles[tileIndex];

            let playerSize = 22;

            let spacing = 5;

            let cols = 2;

            let row = Math.floor(order / cols);

            let col = order % cols;

            let offsetX =
                10 + (col * (playerSize + spacing));

            let offsetY =
                10 + (row * (playerSize + spacing));

            data.player.element.style.left =
                (tile.x + offsetX) + "px";

            data.player.element.style.top =
                (tile.y + offsetY) + "px";

        });

    });

}

function updateUI(){

const boxes = [

document.getElementById("p1box"),
document.getElementById("p2box"),
document.getElementById("p3box"),
document.getElementById("p4box")

];

boxes.forEach(box=>box.innerHTML="");

players.forEach((player,index)=>{

boxes[index].innerHTML =

`
<h3>${player.name}</h3>
💰 Money: ${player.money}<br>
🏠 Properti: ${player.properties.length}
`;

});

turnInfo.innerHTML =
"🎯 Giliran " + players[turnQueue[0]].name;

let queueText = "";

turnQueue.forEach(index=>{

queueText += `[${players[index].name}] ➜ `;

});

queueDisplay.innerHTML = queueText;

}

function addLog(text){

logBox.innerHTML += text + "<br>";

logBox.scrollTop = logBox.scrollHeight;

}

function rollDice(){

if(!gameStarted || isMoving) return;

let currentPlayer = turnQueue[0];

let dice = Math.floor(Math.random()*6)+1;

addLog(
"🎲 " +
players[currentPlayer].name +
" mendapat angka " +
dice
);

movePlayer(currentPlayer,dice);

}

function movePlayer(playerIndex,steps){

isMoving = true;

let count = 0;

let interval = setInterval(()=>{

    players[playerIndex].position++;

    if(players[playerIndex].position >= tiles.length){

        players[playerIndex].position = 0;

        players[playerIndex].money += 150;

        addLog(
            "💰 " +
            players[playerIndex].name +
            " melewati START (+150)"
        );

    }

    updateAllPlayerPositions();

    count++;

    if(count >= steps){

        clearInterval(interval);

        processTile(playerIndex);

    }

},400);

}

function processTile(playerIndex){

let tile = tiles[players[playerIndex].position];

addLog(
"📍 " +
players[playerIndex].name +
" berada di " +
tile.name
);

if(tile.type === "property"){

if(tile.owner === null){

let buy = confirm(

tile.name +
"\nHarga: " +
tile.price +
"\nBeli properti?"

);

if(buy){

if(players[playerIndex].money >= tile.price){

players[playerIndex].money -= tile.price;

tile.owner = playerIndex;

players[playerIndex].properties.push(tile.name);

addLog(
"🏠 " +
players[playerIndex].name +
" membeli " +
tile.name
);

}

}

}
else if(tile.owner !== playerIndex){

players[playerIndex].money -= tile.rent;

players[tile.owner].money += tile.rent;

addLog(
"💸 " +
players[playerIndex].name +
" membayar sewa ke " +
players[tile.owner].name
);

}

}

if(Math.random() < 0.35){

showChallenge(playerIndex);

}

nextTurn();

}

function showChallenge(playerIndex){

let challenge =
storyChallenges[
Math.floor(Math.random()*storyChallenges.length)
];

let choose = confirm(

challenge.question +

"\n\nOK = Jawab Tantangan" +

"\nCancel = Bayar " +
challenge.penalty

);

if(choose){

let ans = prompt("Jawaban:");

if(
ans &&
ans.toLowerCase().trim() ===
challenge.answer.toLowerCase()
){

alert(
"BENAR!\n\n" +
challenge.explanation
);

players[playerIndex].money += challenge.reward;

addLog(
"✅ " +
players[playerIndex].name +
" menjawab benar"
);

}
else{

alert(
"SALAH!\n\n" +
challenge.explanation
);

players[playerIndex].money -= challenge.penalty;

addLog(
"❌ " +
players[playerIndex].name +
" menjawab salah"
);

}

}
else{

players[playerIndex].money -= challenge.penalty;

addLog(
"💸 " +
players[playerIndex].name +
" skip tantangan"
);

}

}

function nextTurn(){

checkWinner();

turnQueue.push(turnQueue.shift());

updateUI();

isMoving = false;

}

function checkWinner(){

players.forEach(player=>{

if(player.money >= targetMoney){

alert(player.name + " MENANG!");

gameStarted = false;

}

if(player.money <= 0){

alert(player.name + " bangkrut!");

gameStarted = false;

}

});

}

</script>

</body>
</html>
