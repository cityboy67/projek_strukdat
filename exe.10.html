<body>

<h1>🎲 TECHOPOLY MONOPOLY</h1>

<div class="top-control">

<input type="number" id="playerCount" min="2" max="4" placeholder="2-4 Player">

<button onclick="startGame()">Start Game</button>

<button onclick="rollDice()">🎲 Roll Dice</button>

</div>

<div class="turn-box" id="turnInfo">
Masukkan jumlah player
</div>

<div class="queue-box" id="queueDisplay"></div>

<div class="game-container">

<div id="p1box" class="player-info"></div>
<div id="p2box" class="player-info"></div>
<div id="p3box" class="player-info"></div>
<div id="p4box" class="player-info"></div>

<div class="board" id="board">

<div class="center-area">
<h1>TECHOPOLY</h1>
<p>Monopoly Struktur Data</p>
<p id="poolDisplay" style="font-size: 16px; margin-top: 10px; color: #e74c3c; font-weight: bold;">Free Parking Pool: 💰0</p>
</div>

</div>

</div>

<div class="log" id="log"></div>

<script>

const board = document.getElementById("board");
const logBox = document.getElementById("log");
const turnInfo = document.getElementById("turnInfo");
const queueDisplay = document.getElementById("queueDisplay");
const poolDisplay = document.getElementById("poolDisplay");

const colors = ["red","blue","green","orange"];

let players = [];
let turnQueue = [];
let gameStarted = false;
let isMoving = false;
let freeParkingPool = 0; // Menampung denda kartu keuangan

const targetMoney = 1500; // Ditingkatkan sedikit agar persaingan list properti terasa

const tiles = [];

/* INDEX PENTING PADA TILE */
const CYBER_JAIL_INDEX = 8;
const FREE_PARKING_INDEX = 16;
const GO_TO_JAIL_INDEX = 24;

/* ====================================== */
/* MEMBUAT TILE */
/* ====================================== */

function createTiles(){

tiles.length = 0;

const names = [

"START",
"Jakarta Digital City",
"Dana Umum",
"Bandung Startup Hub",
"Safe Zone",
"Kesempatan",
"Tokyo Tech Center",
"Cloud District",

"Cyber Jail",

"AI Innovation Lab",
"Dana Umum",
"Singapore Data Center",
"Safe Zone",
"Kesempatan",
"Queue Financial Bank",
"Sorting Factory",

"Free Parking",

"Stack Warehouse",
"Dana Umum",
"Programming Campus",
"Safe Zone",
"Kesempatan",
"Database Central",
"Bug Hunter Zone",

"Go To Jail",

"Data Mining Lab",
"Dana Umum",
"Security Server",
"Safe Zone",
"Kesempatan",
"Algorithm Center",
"Internet Tower"

];

let path = [];

path.push({x:760,y:760,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:672-(i*88),
y:760,
w:88,
h:140
});

}

path.push({x:0,y:760,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:0,
y:672-(i*88),
w:140,
h:88
});

}

path.push({x:0,y:0,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:140+(i*88),
y:0,
w:88,
h:140
});

}

path.push({x:760,y:0,w:140,h:140});

for(let i=0;i<7;i++){

path.push({
x:760,
y:140+(i*88),
w:140,
h:88
});

}

for(let i=0;i<32;i++){

let type = "property";

if(names[i].includes("Dana")) type = "community";
if(names[i].includes("Kesempatan")) type = "chance";
if(names[i].includes("Safe")) type = "safe";
if(names[i].includes("Jail")) type = "jail";
if(names[i] === "START") type = "start";
if(names[i] === "Free Parking") type = "safe";
if(names[i] === "Go To Jail") type = "jail";

tiles.push({

name:names[i],
type:type,

price:100 + (i*5),
rent:20 + (i*2),

owner:null,

x:path[i].x,
y:path[i].y,
w:path[i].w,
h:path[i].h

});

}

}

createTiles();



/* ====================================== */
/* MEMBUAT BOARD */
/* ====================================== */

function createBoard(){

// Bersihkan tile lama jika ada sebelum render ulang (menjaga area tengah tetap ada)
document.querySelectorAll(".tile").forEach(e => e.remove());

tiles.forEach(tile=>{

let div = document.createElement("div");

div.classList.add("tile");

if(tile.w === 140 && tile.h === 140){

div.classList.add("corner");

}
else if(tile.h === 140){

div.classList.add("horizontal");

}
else{

div.classList.add("vertical");

}

if(tile.type === "property") div.classList.add("property");
if(tile.type === "chance") div.classList.add("chance");
if(tile.type === "community") div.classList.add("community");
if(tile.type === "safe") div.classList.add("safe");
if(tile.type === "jail") div.classList.add("jail");

div.style.left = tile.x + "px";
div.style.top = tile.y + "px";

div.innerHTML = tile.name;

board.appendChild(div);

});

}

createBoard();



/* ====================================== */
/* QUIZ STORY TELLING */
/* ====================================== */

const storyChallenges = [

{
question:
"Di sebuah bank digital, pelanggan yang datang lebih dulu selalu dilayani terlebih dahulu agar sistem tetap adil. Sistem apakah yang digunakan?",
answer:"fifo",
reward:80,
penalty:30,
explanation:"Bank menggunakan konsep FIFO"
},

{
question:
"Seorang koki menumpuk piring bersih di dapur. Saat digunakan, piring paling atas selalu diambil lebih dulu. Konsep apakah ini?",
answer:"lifo",
reward:80,
penalty:30,
explanation:"Tumpukan piring menerapkan konsep LIFO"
},

{
question:
"Sebuah perusahaan ingin mengurutkan data pelanggan dari nilai terkecil ke terbesar agar mudah dibaca admin. Proses ini disebut?",
answer:"sorting",
reward:70,
penalty:25,
explanation:"Mengurutkan data disebut sorting"
},

{
question:
"Kereta api memiliki gerbong yang saling terhubung satu per satu. Struktur data apa yang mirip konsep tersebut?",
answer:"linked list",
reward:90,
penalty:35,
explanation:"Gerbong saling terhubung seperti linked list"
}

];



/* ====================================== */
/* KARTU KESEMPATAN */
/* ====================================== */

const chanceCards = [

"🚀 Startup anda viral! +100 uang",
"💻 Sistem server rusak. Denda -70 uang masuk kas Free Parking",
"📈 Investasi AI berhasil. +120 uang",
"🖨 Printer overload karena antrian panjang. Bayar denda 50 ke Free Parking",
"⚡ Anda menemukan algoritma baru. Maju 3 langkah"

];



/* ====================================== */
/* KARTU DANA UMUM */
/* ====================================== */

const communityCards = [

"📦 Gudang data berhasil dirapikan. +80 uang",
"🔌 Server mati mendadak. Denda -60 uang masuk kas Free Parking",
"📊 Data pelanggan berhasil diurutkan. +90 uang",
"🧠 Tim programmer menemukan bug besar. Denda -50 uang masuk kas Free Parking",
"💰 Perusahaan mendapat investor baru. +100 uang"

];



/* ====================================== */
/* START GAME */
/* ====================================== */

function startGame(){

let count =
parseInt(document.getElementById("playerCount").value);

if(isNaN(count) || count < 2 || count > 4){

alert("Player harus 2-4");

return;

}

players = [];
turnQueue = [];
freeParkingPool = 0;
poolDisplay.innerHTML = "Free Parking Pool: 💰" + freeParkingPool;

tiles.forEach(tile=>{

tile.owner = null;

});

document.querySelectorAll(".player").forEach(e=>e.remove());

for(let i=0;i<count;i++){

let player = document.createElement("div");

player.classList.add("player");

player.style.background = colors[i];

player.innerHTML = i+1;

board.appendChild(player);

players.push({

name:"P"+(i+1),
money:500,
position:0,
properties:[],
element:player,
jailTurns: 0 // Menandakan sisa turn dipenjara

});

turnQueue.push(i);

}

gameStarted = true;

updateAllPlayerPositions();

updateUI();

addLog("🎮 Game dimulai!");

}



/* ====================================== */
/* UPDATE POSISI PLAYER */
/* ====================================== */

function updateAllPlayerPositions(){

tiles.forEach((tile,tileIndex)=>{

let playersInTile = [];

players.forEach((player,index)=>{

if(player.position === tileIndex){

playersInTile.push({
player:player,
index:index
});

}

});

playersInTile.forEach((data,order)=>{

let playerSize = 24;

let spacing = 5;

let cols = 2;

let row = Math.floor(order / cols);

let col = order % cols;

let offsetX =
10 + (col * (playerSize + spacing));

let offsetY =
10 + (row * (playerSize + spacing));

data.player.element.style.left =
(tile.x + offsetX) + "px";

data.player.element.style.top =
(tile.y + offsetY) + "px";

});

});

}



/* ====================================== */
/* UPDATE UI */
/* ====================================== */

function updateUI(){

const boxes = [

document.getElementById("p1box"),
document.getElementById("p2box"),
document.getElementById("p3box"),
document.getElementById("p4box")

];

boxes.forEach(box=>box.innerHTML="");

players.forEach((player,index)=>{

// Membuat list HTML untuk list properti
let propsHTML = "";
if(player.properties.length > 0) {
    propsHTML = "<ol class='property-list'>";
    player.properties.forEach(p => {
        propsHTML += `<li>${p}</li>`;
    });
    propsHTML += "</ol>";
} else {
    propsHTML = "<br><span style='font-size:11px; color:#aaa; padding-left:15px;'>Belum ada properti</span>";
}

let statusJail = player.jailTurns > 0 ? ` <span style="color:red;">(🔒 Jailed)</span>` : "";

boxes[index].innerHTML =

`
<h3 style="color:${colors[index]}; margin: 5px 0;">
${player.name}${statusJail}
</h3>

💰 Money: ${player.money}<br>
🏠 Jumlah Properti: ${player.properties.length}
<div style="font-weight:bold; margin-top:5px; font-size:12px;">Daftar Properti:</div>
${propsHTML}
`;

});

poolDisplay.innerHTML = "Free Parking Pool: 💰" + freeParkingPool;

if (turnQueue.length > 0) {
    turnInfo.innerHTML = "🎯 Giliran " + players[turnQueue[0]].name;

    let queueText = "";
    turnQueue.forEach(index=>{
        queueText +=
        `<span style="color:${colors[index]}">
        [${players[index].name}]
        </span> ➜ `;
    });
    queueDisplay.innerHTML = queueText;
}

}



/* ====================================== */
/* LOG */
/* ====================================== */

function addLog(text){

logBox.innerHTML += text + "<br>";

logBox.scrollTop = logBox.scrollHeight;

}



/* ====================================== */
/* ROLL DICE */
/* ====================================== */

function rollDice(){

if(!gameStarted || isMoving) return;

let currentPlayer = turnQueue[0];

// Cek apakah player sedang berada di dalam Cyber Jail
if(players[currentPlayer].jailTurns > 0) {
    players[currentPlayer].jailTurns--;
    addLog(`🔒 ${players[currentPlayer].name} berada di Cyber Jail dan kehilangan putaran ini! (Sisa hukuman: ${players[currentPlayer].jailTurns} turn)`);
    alert(`🔒 ${players[currentPlayer].name} kehilangan turn saat ini karena dipenjara.`);
    nextTurn();
    return;
}

let dice = Math.floor(Math.random()*6)+1;

addLog(
"🎲 " +
players[currentPlayer].name +
" mendapat angka " +
dice
);

movePlayer(currentPlayer,dice);

}



/* ====================================== */
/* MOVE PLAYER */
/* ====================================== */

function movePlayer(playerIndex,steps){

isMoving = true;

let count = 0;

let interval = setInterval(()=>{

players[playerIndex].position++;

if(players[playerIndex].position >= tiles.length){

players[playerIndex].position = 0;

players[playerIndex].money += 150;

addLog(
"💰 " +
players[playerIndex].name +
" melewati START (+150)"
);

}

updateAllPlayerPositions();

count++;

if(count >= steps){

clearInterval(interval);

processTile(playerIndex);

}

},400);

}



/* ====================================== */
/* PROCESS TILE */
/* ====================================== */

function processTile(playerIndex){

let tile = tiles[players[playerIndex].position];

addLog(
"📍 " +
players[playerIndex].name +
" berada di " +
tile.name
);

/* GO TO JAIL TILE MECHANIC */
if(players[playerIndex].position === GO_TO_JAIL_INDEX) {
    alert(`🚨 Ouch! ${players[playerIndex].name} melakukan illegal hacking! Anda dikirim langsung ke Cyber Jail.`);
    players[playerIndex].position = CYBER_JAIL_INDEX; // Pindah langsung ke Cyber Jail
    players[playerIndex].jailTurns = 1; // Kehilangan 1 putaran berikutnya
    addLog(`🚨 ${players[playerIndex].name} dipindahkan ke Cyber Jail dan terkena skip status.`);
    updateAllPlayerPositions();
    nextTurn();
    return;
}

/* FREE PARKING TILE MECHANIC */
if(players[playerIndex].position === FREE_PARKING_INDEX) {
    if(freeParkingPool > 0) {
        alert(`🎁 FREE PARKING! ${players[playerIndex].name} mendapatkan semua bonus kas terkumpul sebesar 💰${freeParkingPool}!`);
        players[playerIndex].money += freeParkingPool;
        addLog(`🎁 ${players[playerIndex].name} mengambil dana Free Parking sebesar +${freeParkingPool}`);
        freeParkingPool = 0;
    } else {
        alert(`🟢 Anda beristirahat dengan aman di Free Parking. Kas pool saat ini kosong.`);
        addLog(`🟢 ${players[playerIndex].name} singgah di Free Parking.`);
    }
}

/* PROPERTY */

if(tile.type === "property"){

if(tile.owner === null){

let buy = confirm(

tile.name +
"\nHarga: " +
tile.price +
"\nBeli properti?"

);

if(buy){

if(players[playerIndex].money >= tile.price){

players[playerIndex].money -= tile.price;

tile.owner = playerIndex;

players[playerIndex].properties.push(tile.name);

addLog(
"🏠 " +
players[playerIndex].name +
" membeli " +
tile.name
);

}
else{

alert("Uang tidak cukup");

}

}

}
else if(
tile.owner !== null &&
tile.owner !== playerIndex
){

players[playerIndex].money -= tile.rent;

players[tile.owner].money += tile.rent;

addLog(
"💸 " +
players[playerIndex].name +
" membayar sewa ke " +
players[tile.owner].name
);

}



/* QUIZ HANYA DI PROPERTY */

if(Math.random() < 0.45){

showChallenge(playerIndex);

}

}



/* KESEMPATAN */

if(tile.type === "chance"){

processChance(playerIndex);

}



/* DANA UMUM */

if(tile.type === "community"){

processCommunity(playerIndex);

}



/* SAFE ZONE & JAIL VISIT ONLY */

if(
tile.type === "safe" ||
tile.type === "start" ||
tile.type === "jail"
){
    if(players[playerIndex].position === CYBER_JAIL_INDEX && players[playerIndex].jailTurns === 0) {
        addLog("🟢 Safe Zone: Berkunjung saja ke Cyber Jail.");
    } else if (players[playerIndex].position !== FREE_PARKING_INDEX) {
        addLog("🟢 Safe Zone");
    }
}



nextTurn();

}



/* ====================================== */
/* PROCESS KESEMPATAN */
/* ====================================== */

function processChance(playerIndex){

let card =
chanceCards[Math.floor(Math.random()*chanceCards.length)];

alert("🎴 KESEMPATAN\n\n" + card);

addLog("🎴 " + card);

if(card.includes("+100"))
players[playerIndex].money += 100;

if(card.includes("+120"))
players[playerIndex].money += 120;

if(card.includes("-70")) {
    players[playerIndex].money -= 70;
    freeParkingPool += 70;
}

if(card.includes("Bayar denda 50")) {
    players[playerIndex].money -= 50;
    freeParkingPool += 50;
}

if(card.includes("Maju 3")){

players[playerIndex].position += 3;

if(players[playerIndex].position >= tiles.length){

players[playerIndex].position %= tiles.length;

}

updateAllPlayerPositions();

}

}



/* ====================================== */
/* PROCESS DANA UMUM */
/* ====================================== */

function processCommunity(playerIndex){

let card =
communityCards[Math.floor(Math.random()*communityCards.length)];

alert("📦 DANA UMUM\n\n" + card);

addLog("📦 " + card);

if(card.includes("+80"))
players[playerIndex].money += 80;

if(card.includes("+90"))
players[playerIndex].money += 90;

if(card.includes("+100"))
players[playerIndex].money += 100;

if(card.includes("-60")) {
    players[playerIndex].money -= 60;
    freeParkingPool += 60;
}

if(card.includes("-50")) {
    players[playerIndex].money -= 50;
    freeParkingPool += 50;
}

}



/* ====================================== */
/* QUIZ */
/* ====================================== */

function showChallenge(playerIndex){

let challenge =
storyChallenges[
Math.floor(Math.random()*storyChallenges.length)
];

let choose = confirm(

challenge.question +

"\n\nOK = Jawab Tantangan" +

"\nCancel = Bayar Denda " +
challenge.penalty + " ke Free Parking"

);

if(choose){

let ans = prompt("Jawaban:");

if(
ans &&
ans.toLowerCase().trim() ===
challenge.answer.toLowerCase()
){

alert(
"✅ BENAR!\n\n" +
challenge.explanation
);

players[playerIndex].money += challenge.reward;

addLog(
"✅ " +
players[playerIndex].name +
" menjawab benar"
);

}
else{

alert(
"❌ SALAH!\n\n" +
challenge.explanation + `. Denda dialokasikan ke Free Parking.`
);

players[playerIndex].money -= challenge.penalty;
freeParkingPool += challenge.penalty;

addLog(
"❌ " +
players[playerIndex].name +
" menjawab salah"
);

}

}
else{

players[playerIndex].money -= challenge.penalty;
freeParkingPool += challenge.penalty;

addLog(
"💸 " +
players[playerIndex].name +
" skip tantangan, denda masuk Free Parking"
);

}

}



/* ====================================== */
/* NEXT TURN */
/* ====================================== */

function nextTurn(){

checkWinner();

turnQueue.push(turnQueue.shift());

updateUI();

isMoving = false;

}



/* ====================================== */
/* CEK PEMENANG */
/* ====================================== */

function checkWinner(){

players.forEach(player=>{

if(player.money >= targetMoney){

alert(player.name + " MENANG karena mencapai batas target finansial!");

gameStarted = false;

}

if(player.money <= 0){

alert(player.name + " bangkrut!");

gameStarted = false;

}

});

}

</script>

</body>
</html>
